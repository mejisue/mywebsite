name: CI Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'front/**'
  pull_request:
    branches:
      - main
    paths:
      - 'front/**'

jobs:
  lint-and-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: front
        run: pnpm lint

      - name: Type check
        working-directory: front
        run: pnpm tsc --noEmit

      - name: Build
        working-directory: front
        run: pnpm build
        env:
          # 빌드 시 필요한 환경변수 (값은 GitHub Secrets에 등록)
          NEXT_PUBLIC_API_SERVER_URL: ${{ secrets.NEXT_PUBLIC_API_SERVER_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GITHUB_ID: ${{ secrets.OAUTH_GITHUB_ID }}
          GITHUB_SECRET: ${{ secrets.OAUTH_GITHUB_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
