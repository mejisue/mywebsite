services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/mywebsite-backend:latest
    container_name: mywebsite-app
    env_file:
      - .env.prod
    environment:
      - DB_HOST=172.17.0.1  # EC2 호스트 IP — shared-mysql(sleact compose)에 접근
      - DB_PORT=3306
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
