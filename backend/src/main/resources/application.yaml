site:
  backend-secret: ${SECRET_KEY}

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
    region: ${AWS_REGION}
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN}

spring:
  profiles:
    active: local
  # 데이터베이스 연결 설정
  datasource:
    url: jdbc:mysql://localhost:3306/my_website?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: '1234'
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 및 하이버네이트 설정
  jpa:
    hibernate:
      # 앱 실행 시 엔티티를 보고 테이블을 자동으로 생성/수정해줍니다.
      ddl-auto: update
    show-sql: true        # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true  # SQL을 보기 좋게 정렬해서 출력
        dialect: org.hibernate.dialect.MySQLDialect
